name: weekly-trending

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.7"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Fetch weekly trending
        run: uv run python scripts/fetch_trending.py --top 20 --out /tmp/trending.json

      - name: Create weekly issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/create_issue.py --input /tmp/trending.json --top 20
